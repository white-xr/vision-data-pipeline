# 相机实时识别运行配置。
# 启动命令：
#   python tools/camera_detect.py

# YOLO 模型配置。
model: runs/detect/data/models/hole_detect_v1/yolo11n_1280_v1/weights/best.pt  # YOLO 权重路径；默认使用当前孔位检测 best.pt

# 相机来源配置。
camera_source: orbbec  # 相机来源；orbbec=奥比中光RGB-D相机，opencv=普通USB/RTSP/HTTP相机

# OpenCV 相机配置，仅当 camera_source: opencv 时生效。
camera_index: 0  # 本机 USB 相机编号；常见为 0/1/2，仅 camera_url 为空时使用
camera_url: null  # 网络相机地址；RTSP/HTTP URL，填入后会优先于 camera_index
backend: auto  # OpenCV 采集后端；auto/dshow/msmf/any/obsensor，Windows 本机相机建议 dshow
read_retries: 30  # 读取首帧重试次数；相机启动慢时可调大
opencv_auto_exposure: null  # OpenCV 自动曝光；null=不改，true=自动，false=手动
opencv_exposure: null  # OpenCV 手动曝光值；null=不改，不同相机/后端单位不同，DirectShow 常见为负数档位
opencv_gain: null  # OpenCV 增益值；null=不改，不同相机/后端范围不同

# 奥比中光 SDK 配置，仅当 camera_source: orbbec 时生效。
orbbec_sdk_dir: D:/OrbbecSDK_v2  # 奥比中光 SDK 根目录；脚本会从其 bin/ 下加载 DLL
orbbec_format: RGB  # 彩色流格式；RGB/MJPG/YUYV/UYVY/NV12/NV21/I420/default，优先用 RGB
orbbec_depth_align: sw  # 深度对齐模式；sw=软件深度对齐到彩色，hw=硬件对齐，disable=不对齐
disable_depth: false  # 是否关闭深度流；false=显示 Z 深度，true=只显示 2D 像素中心
orbbec_timeout_ms: 1000  # 等待 Orbbec 帧超时时间，单位毫秒；网络/USB不稳时可调大
orbbec_color_auto_exposure: null  # 彩色相机自动曝光；null=不改，true=自动曝光，false=手动曝光
orbbec_color_exposure: null  # 彩色相机手动曝光值；null=不改，需先把 orbbec_color_auto_exposure 设为 false
orbbec_color_gain: null  # 彩色相机增益；null=不改，值越大越亮但噪声更多
orbbec_color_ae_max_exposure: null  # 彩色自动曝光最大曝光值；null=不改，仅自动曝光时通常有效
orbbec_color_ae_max_gain: null  # 彩色自动曝光最大增益；null=不改，仅自动曝光时通常有效
orbbec_depth_auto_exposure: null  # 深度相机自动曝光；null=不改，true=自动曝光，false=手动曝光
orbbec_depth_exposure: null  # 深度相机手动曝光值；null=不改，需先把 orbbec_depth_auto_exposure 设为 false
orbbec_depth_gain: null  # 深度相机增益；null=不改，影响深度/IR成像质量
orbbec_ir_auto_exposure: null  # IR 相机自动曝光；null=不改，true=自动曝光，false=手动曝光
orbbec_ir_exposure: null  # IR 相机手动曝光值；null=不改，需先把 orbbec_ir_auto_exposure 设为 false
orbbec_ir_gain: null  # IR 相机增益；null=不改，值越大越亮但噪声更多

# 相机流请求参数。
width: 1280  # 请求彩色图宽度，单位像素；实际分辨率以相机支持的 profile 为准
height: 720  # 请求彩色图高度，单位像素；实际分辨率以相机支持的 profile 为准
fps: 30.0  # 请求帧率；实际帧率以相机和推理速度为准

# YOLO 推理参数。
imgsz: 1280  # YOLO 推理输入尺寸；小孔检测建议 1280，显存不足可降到 960
conf: 0.50  # 置信度阈值；越高误检越少但可能漏检，常用 0.4-0.7
iou: 0.45  # NMS IoU 阈值；控制重叠框合并，常用 0.45
device: "0"  # 推理设备；"0"=第一块 CUDA GPU，"cpu"=CPU
max_det: 100  # 每帧最多保留检测框数量；孔很多时可调大
line_width: 1  # 检测框线宽；显示太粗/太细时调整

# 显示和输出配置。
display_backend: tkinter  # 窗口显示后端；tkinter兼容opencv-python-headless，opencv需要GUI版OpenCV
window_width: 1600  # Tkinter 窗口初始宽度，单位像素；想更大就调大
window_height: 900  # Tkinter 窗口初始高度，单位像素；16:9 屏幕可用 1600x900 或 1920x1080
resize_to_window: true  # 是否让画面随窗口大小缩放；true=拖大/全屏后画面跟着放大，false=原始大小
no_window: false  # 是否禁用显示窗口；true=不弹窗口，适合只保存视频或后台运行
save_video: null  # 识别视频保存路径；null=不保存，示例 data/reports/hole_detect_v1/camera_detect.mp4
snapshot_dir: data/reports/hole_detect_v1/camera_snapshots  # 按 s 保存截图的目录

# 调试开关。
preview_only: false  # 只预览相机画面；true=不加载YOLO，用于确认RGB/深度相机画面是否正常
print_frame_stats: false  # 打印亮度统计；true=每帧输出 min/max/mean，用于排查黑屏/曝光
print_detections: false  # 打印检测结果；true=每帧输出类别、置信度、中心点和Z深度
list_cameras: false  # 扫描 OpenCV 相机编号；true=扫描后退出，仅 camera_source: opencv 排查时使用
