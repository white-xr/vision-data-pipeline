# 通用相机实时识别配置；运行命令：python tools/camera/camera_detect.py
# 换模型时通常只改 model、task、classes、imgsz、conf、draw、draw_centers。

camera:                   # 相机配置；当前项目主要使用奥比中光 335L/305
  source: orbbec          # 相机来源；orbbec=奥比中光 SDK，opencv=普通 USB/RTSP/HTTP
  width: 960              # 请求彩色图宽度；实际值以相机支持的 profile 为准
  height: 600             # 请求彩色图高度；实际值以相机支持的 profile 为准
  fps: 30.0               # 请求帧率；实际帧率由相机、USB 带宽和推理速度共同决定
  orbbec:                 # 奥比中光 SDK 参数；当前 anchor 对位不依赖深度
    depth:                # 深度流配置
      enabled: false      # 是否打开深度流；false=只跑 RGB，窗口和推理更轻

model: data\models\Base_Cover.pt  # 模型权重路径；换模型主要改这一行
task: auto                 # 模型任务类型；auto=自动判断，detect=检测，segment=分割
classes: null              # 类别名文件；需要固定类别名时填 configs/classes.txt，否则用模型自带 names

imgsz: 960                 # YOLO 推理输入尺寸；越大越准但越慢、越吃显存
conf: 0.6                  # 置信度阈值；越高误检越少，但可能漏检
iou: 0.45                  # NMS IoU 阈值；控制重叠检测结果的合并
device: "0"                # 推理设备；"0"=第一张 CUDA GPU，"cpu"=CPU
half: true                 # 是否使用半精度推理；CUDA 建议 true，CPU 会自动忽略
max_det: 3                 # 每帧最多保留目标数量；目标多时调大

draw: detect               # 可视化模式；segment=只看分割，detect=框+标签+中心点，full=全部显示
draw_centers: false        # 是否绘制通用红色中心点；false=只看后处理 Base/Cover 对位点
draw_center_labels: false  # 是否显示中心点坐标和深度文字；false=只画点，避免遮挡工件
center_mode: anchor        # 中心点算法；anchor=检测框内固定比例点，简单稳定
center_depth_window: 15    # 中心点深度取样窗口；15=取中心周围 15x15 区域的有效深度中位数

postprocess:               # 后处理配置；业务逻辑放在插件里，不污染通用检测脚本
  enabled: true            # 是否启用后处理插件；true=启用 Base/Cover 中心优化和 base 锁定
  module: runtime.postprocess_plugins.base_cover_alignment  # 插件模块路径
  function: process        # 插件入口函数；默认 process
  params:                  # 插件参数
    base_class: Base       # 底座类别名；当前 Base_Cover.pt 模型类别为 Base/Cover
    cover_class: Cover     # 盖板类别名；大小写不敏感
    anchors:               # anchor 模式类别锚点；rx/ry 是 bbox 内相对位置
      Cover: {rx: 0.56, ry: 0.48}  # Cover 固定相对中心点
      Base: {rx: 0.50, ry: 0.53}   # Base 固定相对中心点
    base_lock:             # Base 锁定机制；Base 稳定后不再因遮挡更新
      stable_frames: 5     # 连续稳定帧数；达到后锁定 Base 中心
      stable_threshold_px: 5  # 稳定阈值；中心点波动小于该像素距离才计为稳定
      conf_threshold: 0.5  # Base 锁定所需最低置信度
      enable_manual_reset: true  # 是否允许按 R 手动重置锁定状态
    auto_relock:           # 自动重锁辅助；装配动作中锁死，空闲时才允许修复 Base 位移
      enabled: true        # 是否启用后台 Base 位移检测；R 手动重置始终优先
      protection_margin_ratio: 0.15  # Base 保护区外扩比例；Cover 进入该区域时禁止自动重锁
      move_threshold_px: 20  # Base 相对锁定点位移超过该像素距离才进入重锁候选
      stable_frames: 5     # 位移后的 Base 连续稳定帧数；达到后自动重锁
      stable_threshold_px: 5  # 重锁候选稳定阈值；中心波动小于该值才认为稳定
      max_bbox_change_ratio: 0.20  # bbox 宽高变化上限；超过 20% 视为遮挡/误检，不重锁
      cooldown_frames: 45  # 自动重锁后的冷却帧数；防止抖动反复跳
      message_frames: 45   # 自动重锁成功提示显示帧数
      conf_threshold: 0.5  # 自动重锁候选 Base 最低置信度

display:                   # 显示窗口配置
  backend: tkinter         # 显示后端；tkinter 兼容性好，opencv 依赖 GUI 版 OpenCV
  resize_to_window: false  # 是否随窗口缩放画面；false=按相机原始尺寸显示

output:                    # 输出配置
  snapshot_dir: data/reports/camera_snapshots  # 按 s 保存截图的目录
