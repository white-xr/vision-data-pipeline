# 多相机多模型串行配置；运行命令：python tools/camera/multi_camera_detect.py
# 日常只需要在 pipelines 里写 camera: orbbec_335l / orbbec_305，然后给该相机挂模型。

camera_aliases:            # 相机别名；业务 pipeline 里只引用别名，不写 serial
  orbbec_335l:
    source: orbbec
    width: 960
    height: 600
    fps: 30.0
    orbbec:
      match_name: Gemini 335L
      depth:
        enabled: false
  orbbec_305:
    source: orbbec
    width: 960
    height: 600
    fps: 30.0
    orbbec:
      match_name: Gemini 305
      depth:
        enabled: false

common:                    # 所有 pipeline 的通用默认参数
  inference:
    imgsz: 960
    conf: 0.6
    iou: 0.45
    device: "0"
    half: true
    infer_stride: 1
    max_det: 20
  visualize:
    draw_masks: false
    draw_boxes: true
    draw_boxes_when_no_mask: true
    draw_labels: true
    draw_centers: false
    draw_center_labels: false
    center_mode: anchor
    line_width: 2
    mask_alpha: 0.35
  display:
    backend: opencv        # 多窗口建议用 opencv；tkinter 更适合单窗口
    resize_to_window: false
  output:
    snapshot_dir: data/reports/camera_snapshots

pipelines:
  - name: base_cover_335l  # 335L 相机：Base/Cover 对位
    camera: orbbec_335l
    display:
      window_title: 335L Base Cover
    models:                 # 模型按从上到下串行运行；task 写 detect/segment/auto
      - name: base_cover
        path: data/models/Base_Cover.pt
        task: detect
        conf: 0.6
        imgsz: 960
        max_det: 3
        infer_stride: 1
      - name: hole
        path: data/models/hole.pt
        task: detect
        center_mode: box        # hole 中心点用 bbox 几何中心
        draw_centers: true      # 显示 hole 的 bbox 中心点
        draw_center_labels: false  # 只画中心点，不显示坐标文字
        conf: 0.5
        imgsz: 640
    postprocess:
      enabled: true
      module: runtime.postprocess_plugins.base_cover_alignment
      function: process
      params:
        base_class: Base
        cover_class: Cover
        center_depth_window: 15
        anchors:
          Cover: {rx: 0.56, ry: 0.48}
          Base: {rx: 0.50, ry: 0.53}
        base_lock:
          stable_frames: 5
          stable_threshold_px: 5
          conf_threshold: 0.5
          enable_manual_reset: true
        auto_relock:
          enabled: true
          protection_margin_ratio: 0.15
          cover_block_mode: center  # center=Cover 中心进保护区才阻止重锁，避免大 bbox 擦边一直阻止刷新
          move_threshold_px: 20  # Base 相对锁定点移动超过 20px 才认为可能搬动了
          stable_frames: 4       # 新 Base 连续稳定 4 帧后自动重锁
          stable_threshold_px: 10  # 自动重锁稳定阈值；允许真实相机下的检测抖动
          max_bbox_change_ratio: 0.35  # bbox 宽高变化上限；放宽到 35%，避免正常倾斜导致无法重锁
          cooldown_frames: 45    # 自动重锁后的冷却帧数；防止反复跳
          message_frames: 45     # 自动重锁成功提示显示帧数
          conf_threshold: 0.5    # 自动重锁候选 Base 最低置信度

  - name: reserved_305     # 305 相机：hole + triangle-metal 串行验证
    enabled: true
    camera: orbbec_305
    display:
      window_title: 305 Reserved
    models:                 # 多个模型按从上到下串行运行；segment 模型可单独 draw_masks
      - name: hole
        path: data/models/hole.pt
        task: detect
        center_mode: box        # hole 中心点用 bbox 几何中心
        draw_centers: true      # 显示 hole 的 bbox 中心点
        draw_center_labels: false  # 只画中心点，不显示坐标文字
        conf: 0.5
        imgsz: 640
      - name: triangle_metal
        path: data/models/triangle-metal.pt
        task: segment
        draw_masks: true
        conf: 0.5
        imgsz: 640
